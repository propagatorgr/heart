<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Προσομοίωση Καρδιακού Ρυθμού</title>

  <!-- p5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f0f0f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    header {
      background: darkred;
      color: white;
      padding: 12px;
      text-align: center;
      font-size: 1.2rem;
    }

    main {
      display: flex;
      gap: 20px;
      padding: 20px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    #controls {
      min-width: 220px;
      max-width: 260px;
      background: #fafafa;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 0 4px rgba(0,0,0,0.15);
    }

    canvas {
      background: white;
      border: 1px solid #ccc;
    }

    footer {
      text-align: center;
      font-size: 0.85rem;
      color: #555;
      padding: 10px;
    }

    @media (max-width: 900px) {
      main {
        flex-direction: column;
        align-items: center;
      }

      #controls {
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>

<body>
  <header>
    🫀 Προσομοίωση Καρδιακού Ρυθμού
  </header>

  <main id="main"></main>

  <footer>
    Εκπαιδευτική εφαρμογή Βιολογίας – p5.js
  </footer>

  <script src="sketch.js"></script>
</body>
</html>
